name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024b
      - name: Lint
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath('.agent/skills/lint/scripts');
            lintCode();
      - name: Run tests
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath('tests');
            import matlab.unittest.TestSuite;
            suite = TestSuite.fromPackage('robot', 'IncludingSubpackages', true);
            results = run(suite);
            fprintf('\n=== %d/%d passed, %d failed ===\n', ...
                nnz([results.Passed]), numel(results), nnz([results.Failed]));
            assertSuccess(results);
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults.xml
